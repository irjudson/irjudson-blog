theme: jekyll-theme-chirpy

lang: en
timezone: America/Denver

title: Ivan R. Judson
tagline: "Founder, Buffalo Jump Forge — AI systems, hardware, and the craft of building things."
description: >-
  Writing on AI systems, hardware, firmware, PCB design, and independent building.
  Based in Three Forks, Montana.

url: "https://irjudson.org"

github:
  username: irjudson

twitter:
  username: irjudson

social:
  name: Ivan R. Judson
  email: irjudson@gmail.com
  links:
    - https://github.com/irjudson
    - https://www.linkedin.com/in/irjudson
    - https://twitter.com/irjudson
    - https://bsky.app/profile/irjudson.bsky.social

avatar: "https://avatars.githubusercontent.com/u/11219?v=4"

theme_mode: # [light | dark] — leave blank to follow system

toc: true

comments:
  active: ""

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - posts/
  - drafts/
  - templates/
  - workflows/
  - legacy-scripts/
  - "*.py"
  - README.md
  - PUBLISHING*.md
  - STRUCTURE.md
  - START-HERE.md
  - SITE-OPTIMIZATION-TODO.md
  - COPYRIGHT.md
  - LICENSE

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
